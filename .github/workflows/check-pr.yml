name: Check PR
on:
    pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  main:
    name: Run checks for specification
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify direct bikeshed build
        run: bikeshed spec

      - name: Build specification with SDL tables
        run: python compile.py

      - name: Generate PDF
        run: python compile.py --pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: specification
          path: |
            index.html
            index.pdf
            images/
          retention-days: 30

      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const prNumber = context.issue.number;

            const commentBody = `## 📄 Specification Preview

            The specification has been built for this PR!

            ### 🔗 Download
            **[Download Build Artifact](https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId})**

            ### 📦 What's included:
            - \`index.html\` — Specification with SDL syntax tables
            - \`index.pdf\` — PDF version

            ---
            *Built from commit ${context.sha.substring(0, 7)} • ${new Date().toUTCString()}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📄 Specification Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

